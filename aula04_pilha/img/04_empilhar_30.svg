<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <text x="350" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">
    Passo 4 — empilhar(30)
  </text>

  <!-- topo no novo nó (30), em cima -->
  <text x="200" y="125" text-anchor="end" font-size="14" font-weight="600" fill="#2c5d8a">topo →</text>

  <!-- Nó 30 (novo) -->
  <rect x="215" y="100" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2.5" rx="4"/>
  <line x1="295" y1="100" x2="295" y2="160" stroke="#2c5d8a" stroke-width="2"/>
  <text x="255" y="138" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">30</text>
  <circle cx="315" cy="130" r="3.5" fill="#2c5d8a"/>

  <path d="M 315 165 Q 315 200, 275 200 L 275 220" fill="none" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="270,215 275,228 280,215" fill="#2c5d8a"/>

  <!-- Nó 20 -->
  <rect x="215" y="225" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="295" y1="225" x2="295" y2="285" stroke="#2c5d8a" stroke-width="2"/>
  <text x="255" y="263" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">20</text>
  <circle cx="315" cy="255" r="3.5" fill="#2c5d8a"/>

  <path d="M 315 290 Q 315 325, 275 325 L 275 345" fill="none" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="270,340 275,353 280,340" fill="#2c5d8a"/>

  <!-- Nó 10 -->
  <rect x="215" y="350" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="295" y1="350" x2="295" y2="410" stroke="#2c5d8a" stroke-width="2"/>
  <text x="255" y="388" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">10</text>
  <text x="315" y="388" text-anchor="middle" font-size="14" fill="#888">∅</text>

  <text x="355" y="383" font-size="13" fill="#888" font-style="italic">(NULL — fundo)</text>

  <!-- Nota -->
  <text x="350" y="450" text-anchor="middle" font-size="13" fill="#5a7a9a" font-style="italic">
    a pilha cresce para cima · 10 (o primeiro a entrar) está no fundo
  </text>
</svg>
