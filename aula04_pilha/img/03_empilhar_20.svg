<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <text x="350" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">
    Passo 3 — empilhar(20)
  </text>

  <!-- topo no nó novo (20), em cima -->
  <text x="200" y="125" text-anchor="end" font-size="14" font-weight="600" fill="#2c5d8a">topo →</text>

  <!-- Nó 20 (novo, no topo) -->
  <rect x="215" y="100" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2.5" rx="4"/>
  <line x1="295" y1="100" x2="295" y2="160" stroke="#2c5d8a" stroke-width="2"/>
  <text x="255" y="138" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">20</text>
  <circle cx="315" cy="130" r="3.5" fill="#2c5d8a"/>

  <!-- Seta 20 -> 10 (descendo) -->
  <path d="M 315 165 Q 315 200, 275 200 L 275 220" fill="none" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="270,215 275,228 280,215" fill="#2c5d8a"/>

  <!-- Nó 10 (embaixo) -->
  <rect x="215" y="225" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="295" y1="225" x2="295" y2="285" stroke="#2c5d8a" stroke-width="2"/>
  <text x="255" y="263" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">10</text>
  <text x="315" y="263" text-anchor="middle" font-size="14" fill="#888">∅</text>

  <text x="355" y="258" font-size="13" fill="#888" font-style="italic">(NULL — fundo)</text>

  <!-- Nota -->
  <line x1="100" y1="315" x2="600" y2="315" stroke="#cfd6dd" stroke-width="1"/>
  <text x="350" y="340" text-anchor="middle" font-size="13" fill="#5a7a9a" font-style="italic">
    o antigo topo "afunda" um nível · o novo nó é o topo
  </text>
</svg>
