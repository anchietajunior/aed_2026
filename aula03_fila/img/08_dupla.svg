<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">
    Fila duplamente encadeada — cada nó conhece o anterior e o próximo
  </text>

  <!-- inicio -->
  <text x="100" y="180" text-anchor="end" font-size="14" font-weight="600" fill="#2c5d8a">inicio →</text>

  <!-- Nó 1: [∅ | 10 | *] -->
  <rect x="110" y="140" width="180" height="80" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="155" y1="140" x2="155" y2="220" stroke="#2c5d8a" stroke-width="2"/>
  <line x1="245" y1="140" x2="245" y2="220" stroke="#2c5d8a" stroke-width="2"/>
  <text x="132" y="170" text-anchor="middle" font-size="11" fill="#888">prev</text>
  <text x="132" y="195" text-anchor="middle" font-size="14" fill="#888">∅</text>
  <text x="200" y="170" text-anchor="middle" font-size="11" fill="#888">valor</text>
  <text x="200" y="200" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">10</text>
  <text x="268" y="170" text-anchor="middle" font-size="11" fill="#888">next</text>
  <circle cx="268" cy="195" r="3.5" fill="#2c5d8a"/>

  <!-- Setas duplas entre nó 1 e nó 2 -->
  <line x1="290" y1="180" x2="335" y2="180" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="330,175 342,180 330,185" fill="#2c5d8a"/>
  <line x1="335" y1="200" x2="290" y2="200" stroke="#5a7a9a" stroke-width="1.8" stroke-dasharray="3,2"/>
  <polygon points="295,195 285,200 295,205" fill="#5a7a9a"/>

  <!-- Nó 2: [* | 20 | *] -->
  <rect x="345" y="140" width="180" height="80" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="390" y1="140" x2="390" y2="220" stroke="#2c5d8a" stroke-width="2"/>
  <line x1="480" y1="140" x2="480" y2="220" stroke="#2c5d8a" stroke-width="2"/>
  <text x="367" y="170" text-anchor="middle" font-size="11" fill="#888">prev</text>
  <circle cx="367" cy="195" r="3.5" fill="#5a7a9a"/>
  <text x="435" y="170" text-anchor="middle" font-size="11" fill="#888">valor</text>
  <text x="435" y="200" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">20</text>
  <text x="503" y="170" text-anchor="middle" font-size="11" fill="#888">next</text>
  <circle cx="503" cy="195" r="3.5" fill="#2c5d8a"/>

  <!-- Setas duplas entre nó 2 e nó 3 -->
  <line x1="525" y1="180" x2="570" y2="180" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="565,175 577,180 565,185" fill="#2c5d8a"/>
  <line x1="570" y1="200" x2="525" y2="200" stroke="#5a7a9a" stroke-width="1.8" stroke-dasharray="3,2"/>
  <polygon points="530,195 520,200 530,205" fill="#5a7a9a"/>

  <!-- Nó 3: [* | 30 | ∅] -->
  <rect x="580" y="140" width="180" height="80" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="625" y1="140" x2="625" y2="220" stroke="#2c5d8a" stroke-width="2"/>
  <line x1="715" y1="140" x2="715" y2="220" stroke="#2c5d8a" stroke-width="2"/>
  <text x="602" y="170" text-anchor="middle" font-size="11" fill="#888">prev</text>
  <circle cx="602" cy="195" r="3.5" fill="#5a7a9a"/>
  <text x="670" y="170" text-anchor="middle" font-size="11" fill="#888">valor</text>
  <text x="670" y="200" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">30</text>
  <text x="738" y="170" text-anchor="middle" font-size="11" fill="#888">next</text>
  <text x="738" y="200" text-anchor="middle" font-size="14" fill="#888">∅</text>

  <!-- fim -->
  <text x="780" y="180" font-size="14" font-weight="600" fill="#2c5d8a">← fim</text>

  <!-- Legenda das setas -->
  <line x1="100" y1="265" x2="800" y2="265" stroke="#cfd6dd" stroke-width="1"/>
  <text x="220" y="290" text-anchor="middle" font-size="12" fill="#2c5d8a">
    <tspan font-weight="600">→</tspan> ponteiro <tspan font-style="italic">next</tspan>
  </text>
  <text x="450" y="290" text-anchor="middle" font-size="12" fill="#5a7a9a">
    <tspan font-weight="600">⇠</tspan> ponteiro <tspan font-style="italic">prev</tspan> (tracejado)
  </text>
  <text x="680" y="290" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    custo: 1 ponteiro extra por nó
  </text>
</svg>
