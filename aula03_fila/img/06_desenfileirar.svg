<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">
    Passo 6 — desenfileirar() remove 10
  </text>

  <!-- Nó 1 antigo (10) — desenhado em cinza, marcado como "free" -->
  <rect x="180" y="140" width="120" height="60" fill="#f0f0f0" stroke="#cfd6dd" stroke-width="2" stroke-dasharray="4,4" rx="4"/>
  <line x1="260" y1="140" x2="260" y2="200" stroke="#cfd6dd" stroke-width="2"/>
  <text x="220" y="178" text-anchor="middle" font-size="22" fill="#aaa"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">10</text>
  <text x="280" y="178" text-anchor="middle" font-size="14" fill="#aaa">×</text>

  <!-- "free" sobre o nó antigo -->
  <text x="240" y="125" text-anchor="middle" font-size="13" fill="#b54" font-weight="600" font-style="italic">
    free()
  </text>

  <!-- inicio agora aponta para o nó 2 -->
  <text x="350" y="105" text-anchor="end" font-size="14" font-weight="600" fill="#2c5d8a">inicio →</text>
  <line x1="355" y1="100" x2="395" y2="135" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="391,127 396,138 386,135" fill="#2c5d8a"/>

  <!-- Nó 2: 20 (agora a frente) -->
  <rect x="360" y="140" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="440" y1="140" x2="440" y2="200" stroke="#2c5d8a" stroke-width="2"/>
  <text x="400" y="178" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">20</text>
  <circle cx="460" cy="170" r="3.5" fill="#2c5d8a"/>

  <line x1="480" y1="170" x2="530" y2="170" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="525,165 537,170 525,175" fill="#2c5d8a"/>

  <!-- Nó 3: 30 -->
  <rect x="540" y="140" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="620" y1="140" x2="620" y2="200" stroke="#2c5d8a" stroke-width="2"/>
  <text x="580" y="178" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">30</text>
  <text x="640" y="178" text-anchor="middle" font-size="14" fill="#888">∅</text>

  <text x="690" y="170" font-size="14" font-weight="600" fill="#2c5d8a">← fim</text>

  <!-- Box de retorno -->
  <rect x="350" y="240" width="200" height="40" fill="#fffbe6" stroke="#2c5d8a" stroke-width="1.5" rx="4"/>
  <text x="450" y="265" text-anchor="middle" font-size="15" fill="#2c5d8a" font-weight="600">
    retorno: 10
  </text>

  <!-- Nota -->
  <text x="450" y="305" text-anchor="middle" font-size="12" fill="#5a7a9a" font-style="italic">
    inicio avança · nó antigo é liberado · fim continua em [30] (ainda há nós). Custo O(1).
  </text>
</svg>
