<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">
    Passo 3 — enfileirar(20)
  </text>

  <!-- inicio -->
  <text x="190" y="170" text-anchor="end" font-size="14" font-weight="600" fill="#2c5d8a">inicio →</text>

  <!-- Nó 1: 10 -->
  <rect x="200" y="140" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="280" y1="140" x2="280" y2="200" stroke="#2c5d8a" stroke-width="2"/>
  <text x="240" y="178" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">10</text>
  <circle cx="300" cy="170" r="3.5" fill="#2c5d8a"/>

  <!-- Seta nó1 -> nó2 -->
  <line x1="320" y1="170" x2="370" y2="170" stroke="#2c5d8a" stroke-width="2.5"/>
  <polygon points="365,165 377,170 365,175" fill="#2c5d8a"/>

  <!-- Nó 2: 20 -->
  <rect x="380" y="140" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="460" y1="140" x2="460" y2="200" stroke="#2c5d8a" stroke-width="2"/>
  <text x="420" y="178" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">20</text>
  <text x="480" y="178" text-anchor="middle" font-size="14" fill="#888">∅</text>

  <!-- fim -->
  <text x="520" y="170" font-size="14" font-weight="600" fill="#2c5d8a">← fim</text>

  <!-- Nota destacando o que mudou -->
  <line x1="100" y1="240" x2="700" y2="240" stroke="#cfd6dd" stroke-width="1"/>
  <text x="400" y="265" text-anchor="middle" font-size="13" fill="#5a7a9a" font-style="italic">
    fim avança para o nó novo · inicio permanece em [10]
  </text>
</svg>
