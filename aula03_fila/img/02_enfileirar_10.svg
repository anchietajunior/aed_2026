<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <text x="350" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">
    Passo 2 — enfileirar(10)
  </text>

  <!-- Ponteiro inicio (em cima) -->
  <text x="280" y="100" text-anchor="end" font-size="13" font-weight="600" fill="#2c5d8a">inicio →</text>
  <line x1="285" y1="95" x2="320" y2="125" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="316,118 321,128 312,128" fill="#2c5d8a"/>

  <!-- Rótulos dos campos -->
  <text x="335" y="140" text-anchor="middle" font-size="11" fill="#888">valor</text>
  <text x="395" y="140" text-anchor="middle" font-size="11" fill="#888">prox</text>

  <!-- Nó: 10 -->
  <rect x="295" y="150" width="120" height="60" fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2" rx="4"/>
  <line x1="375" y1="150" x2="375" y2="210" stroke="#2c5d8a" stroke-width="2"/>
  <text x="335" y="188" text-anchor="middle" font-size="22" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">10</text>
  <text x="395" y="188" text-anchor="middle" font-size="14" fill="#888">∅</text>

  <text x="430" y="183" font-size="13" fill="#888" font-style="italic">(NULL)</text>

  <!-- Ponteiro fim (em baixo, mesmo nó) -->
  <line x1="290" y1="245" x2="325" y2="215" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="320,219 325,209 332,217" fill="#2c5d8a"/>
  <text x="285" y="252" text-anchor="end" font-size="13" font-weight="600" fill="#2c5d8a">fim →</text>

  <!-- Nota -->
  <text x="350" y="265" text-anchor="middle" font-size="13" fill="#5a7a9a" font-style="italic">
    inicio == fim (invariante I2) · fila com um único elemento
  </text>
</svg>
