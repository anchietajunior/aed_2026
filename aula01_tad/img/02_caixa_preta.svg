<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <!-- ===== Cabeçalhos dos atores ===== -->
  <!-- Cliente -->
  <rect x="100" y="20" width="200" height="50" rx="6"
        fill="#f7f9fc" stroke="#2c5d8a" stroke-width="2"/>
  <text x="200" y="52" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">Cliente</text>

  <!-- TAD Pilha -->
  <rect x="600" y="20" width="200" height="50" rx="6"
        fill="#e8f0f8" stroke="#2c5d8a" stroke-width="2"/>
  <text x="700" y="52" text-anchor="middle" font-size="18" font-weight="600" fill="#2c5d8a">TAD Pilha</text>

  <!-- ===== Linhas de vida (dashed) ===== -->
  <line x1="200" y1="72" x2="200" y2="540" stroke="#5a7a9a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="700" y1="72" x2="700" y2="540" stroke="#5a7a9a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ===== 1) criar() ===== -->
  <text x="450" y="100" text-anchor="middle" font-size="15" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">criar()</text>
  <line x1="200" y1="110" x2="690" y2="110" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="685,105 698,110 685,115" fill="#2c5d8a"/>
  <!-- nota de estado -->
  <rect x="610" y="124" width="180" height="26" rx="3" fill="#fffbe6" stroke="#cfd6dd" stroke-width="1"/>
  <text x="700" y="142" text-anchor="middle" font-size="13" fill="#666" font-style="italic">estado: vazia</text>

  <!-- ===== 2) empilhar(5) ===== -->
  <text x="450" y="180" text-anchor="middle" font-size="15" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">empilhar(5)</text>
  <line x1="200" y1="190" x2="690" y2="190" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="685,185 698,190 685,195" fill="#2c5d8a"/>
  <rect x="610" y="204" width="180" height="26" rx="3" fill="#fffbe6" stroke="#cfd6dd" stroke-width="1"/>
  <text x="700" y="222" text-anchor="middle" font-size="13" fill="#666" font-style="italic">estado: contém 5</text>

  <!-- ===== 3) empilhar(8) ===== -->
  <text x="450" y="260" text-anchor="middle" font-size="15" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">empilhar(8)</text>
  <line x1="200" y1="270" x2="690" y2="270" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="685,265 698,270 685,275" fill="#2c5d8a"/>
  <rect x="610" y="284" width="180" height="26" rx="3" fill="#fffbe6" stroke="#cfd6dd" stroke-width="1"/>
  <text x="700" y="302" text-anchor="middle" font-size="13" fill="#666" font-style="italic">estado: contém 5, 8</text>

  <!-- ===== 4) topo() + retorno 8 ===== -->
  <text x="450" y="340" text-anchor="middle" font-size="15" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">topo()</text>
  <line x1="200" y1="350" x2="690" y2="350" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="685,345 698,350 685,355" fill="#2c5d8a"/>
  <!-- retorno (seta tracejada para a esquerda) -->
  <text x="450" y="378" text-anchor="middle" font-size="14" fill="#5a7a9a" font-style="italic">retorna 8</text>
  <line x1="690" y1="388" x2="210" y2="388" stroke="#5a7a9a" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="215,383 202,388 215,393" fill="#5a7a9a"/>

  <!-- ===== 5) desempilhar() ===== -->
  <text x="450" y="420" text-anchor="middle" font-size="15" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">desempilhar()</text>
  <line x1="200" y1="430" x2="690" y2="430" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="685,425 698,430 685,435" fill="#2c5d8a"/>
  <rect x="610" y="444" width="180" height="26" rx="3" fill="#fffbe6" stroke="#cfd6dd" stroke-width="1"/>
  <text x="700" y="462" text-anchor="middle" font-size="13" fill="#666" font-style="italic">estado: contém 5</text>

  <!-- ===== 6) vazia() + retorno falso ===== -->
  <text x="450" y="498" text-anchor="middle" font-size="15" fill="#222"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">vazia()</text>
  <line x1="200" y1="508" x2="690" y2="508" stroke="#2c5d8a" stroke-width="2"/>
  <polygon points="685,503 698,508 685,513" fill="#2c5d8a"/>
  <text x="450" y="534" text-anchor="middle" font-size="14" fill="#5a7a9a" font-style="italic">retorna falso</text>
</svg>
